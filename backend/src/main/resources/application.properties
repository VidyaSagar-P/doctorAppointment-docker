server.port=${SERVER_PORT:8080}

spring.sql.init.platform=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Datasource configuration - environment-variable driven with sensible defaults
#spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hospitaldata?createDatabaseIfNotExist=true}
app.datasource.host=${DB_HOST:localhost}
app.datasource.port=${DB_PORT:3306}
app.datasource.database=${DB_NAME:hospitaldata}

spring.datasource.url=jdbc:mysql://${app.datasource.host}:${app.datasource.port}/${app.datasource.database}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Admin@123}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# CORS configuration - comma separated list of allowed origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
